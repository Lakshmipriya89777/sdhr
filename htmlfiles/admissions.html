<!DOCTYPE html>
<html>
<head>
  <title>Admission Enquiry Chat</title>
  <link rel="stylesheet" href="../css/admission.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">

</head>

<body>

<div class="container">
  <h2>🎓 Admission Enquiry Chat</h2>

  <input id="name" placeholder="Your Name">
  <input id="message" placeholder="Type your enquiry">
  <button onclick="sendMessage()">Send</button>

  <div id="chatBox"></div>
</div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔥 Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const chatRef = collection(db, "admission_enquiries");
  const q = query(chatRef, orderBy("time"));

  // 💬 SEND MESSAGE
  window.sendMessage = async function () {
    let name = document.getElementById("name").value;
    let message = document.getElementById("message").value;

    if (!name || !message) {
      alert("Please fill all fields");
      return;
    }

    // user message
    await addDoc(chatRef, {
      name,
      message,
      type: "user",
      time: new Date()
    });

    // optional AI reply (simple rule-based if no API)
    setTimeout(async () => {
      await addDoc(chatRef, {
        name: "AI Assistant",
        message: generateReply(message),
        type: "ai",
        time: new Date()
      });
    }, 1000);

    document.getElementById("message").value = "";
  };

  // 🤖 Simple AI logic (you can replace with OpenAI later)
  function generateReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("fee")) return "Our college fee details will be shared during admission process.";
    if (msg.includes("course")) return "We offer B.Com, B.Sc, B.A, and PG courses.";
    if (msg.includes("admission")) return "Admissions are open now. Please visit college office.";
    if (msg.includes("hello")) return "Hello! How can I help you with admissions?";
    
    return "Thank you for your enquiry. Our team will contact you soon.";
  }

  // 🔄 REAL-TIME CHAT
  onSnapshot(q, (snapshot) => {
    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    snapshot.forEach((doc) => {
      let data = doc.data();

      let bg = data.type === "ai" ? "#d4f8d4" : "#dbefff";
      let align = data.type === "ai" ? "left" : "right";

      chatBox.innerHTML += `
        <div style="
          margin:10px 0;
          padding:10px;
          background:${bg};
          border-radius:10px;
          text-align:${align};
        ">
          <b>${data.name}</b><br>
          ${data.message}
        </div>
      `;
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });

</script>

</body>
</html>
