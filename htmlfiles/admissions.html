<!DOCTYPE html>
<html>
<head>
  <title>ADMISSION ENQUIRY CHAT</title>
</head>

<body>
  <body style="font-family: Arial; background:#f2f2f2;">

  <div style="width:400px;margin:auto;margin-top:30px;background:white;padding:20px;border-radius:10px;">

    <h2>🎓 Admission Chat</h2>

    <input id="name" placeholder="Your Name"
      style="width:100%;padding:10px;margin-bottom:10px;">

    <input id="message" placeholder="Your Enquiry"
      style="width:100%;padding:10px;margin-bottom:10px;">

    <button onclick="sendMessage()"
      style="width:100%;padding:10px;background:green;color:white;border:none;">
      Send
    </button>

    <div id="chatBox" style="margin-top:20px;height:300px;overflow:auto;"></div>

  </div>

  <script type="module">
    // Import Firebase modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAgDI3b7xS11qYvC9oQKFWbYTAKJdVHffk",
      authDomain: "sdhr-chat.firebaseapp.com",
      projectId: "sdhr-chat",
      storageBucket: "sdhr-chat.appspot.com",
      messagingSenderId: "58527401520",
      appId: "1:58527401520:web:5945df00f201b6eecf0ff5",
      measurementId: "G-LGHTVMF0J7"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Send message to Firestore
    window.sendMessage = async function () {
      let name = document.getElementById("name").value;
      let message = document.getElementById("message").value;

      if (name === "" || message === "") {
        alert("Please fill all fields");
        return;
      }

      await addDoc(collection(db, "admission_enquiries"), {
        name: name,
        message: message,
        time: new Date()
      });

      document.getElementById("message").value = "";
    };

    // Real-time chat display
    const q = query(collection(db, "admission_enquiries"), orderBy("time"));

    onSnapshot(q, (snapshot) => {
      let chatBox = document.getElementById("chatBox");
      chatBox.innerHTML = "";

      snapshot.forEach((doc) => {
        let data = doc.data();
        chatBox.innerHTML += `
          <p><b>${data.name}:</b> ${data.message}</p>
        `;
      });
    });
  </script>
</body>
</html>
