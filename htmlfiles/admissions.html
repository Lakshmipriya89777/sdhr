<!DOCTYPE html>
<html>
<head>
  <title>Admission Enquiry Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 420px;
      max-width: 95%;
      margin: 20px auto;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      background: #2e7d32;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #1b5e20;
    }

    #chatBox {
      height: 400px;
      overflow-y: auto;
      margin-top: 15px;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 10px;
      background: #fafafa;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 80%;
      clear: both;
    }

    .user {
      background: #dbefff;
      float: right;
      text-align: right;
    }

    .ai {
      background: #d4f8d4;
      float: left;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🎓 Admission Enquiry Chat</h2>

  <input id="name" placeholder="Your Name">
  <input id="message" placeholder="Type your enquiry">
  <button onclick="sendMessage()">Send</button>

  <div id="chatBox"></div>
</div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔥 Firebase Config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const chatRef = collection(db, "admission_enquiries");
  const q = query(chatRef, orderBy("time", "asc"));

  // 💬 SEND MESSAGE
  window.sendMessage = async function () {
    let name = document.getElementById("name").value.trim();
    let message = document.getElementById("message").value.trim();

    if (!name || !message) {
      alert("Please enter all fields");
      return;
    }

    // USER MESSAGE
    await addDoc(chatRef, {
      name,
      message,
      type: "user",
      time: serverTimestamp()
    });

    document.getElementById("message").value = "";

    // 🤖 AI RESPONSE (auto)
    setTimeout(async () => {
      await addDoc(chatRef, {
        name: "AI Assistant",
        message: generateReply(message),
        type: "ai",
        time: serverTimestamp()
      });
    }, 800);
  };

  // 🤖 AI LOGIC
  function generateReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("fee"))
      return "💰 Fee details will be shared during admission. Please contact office.";

    if (msg.includes("course"))
      return "📚 We offer B.Com, B.Sc, B.A and PG courses.";

    if (msg.includes("admission"))
      return "🎓 Admissions are open now. You can apply in college office.";

    if (msg.includes("hello"))
      return "👋 Hello! How can I help you with admissions?";

    return "📌 Thank you for your enquiry. Our team will contact you soon.";
  }

  // 🔄 REAL TIME CHAT
  onSnapshot(q, (snapshot) => {
    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    snapshot.forEach((doc) => {
      let data = doc.data();

      let div = document.createElement("div");
      div.classList.add("msg");
      div.classList.add(data.type === "ai" ? "ai" : "user");

      div.innerHTML = `<b>${data.name}</b><br>${data.message}`;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });

</script>

</body>
</html>
