<!DOCTYPE html>
<html>
<head>
  <title>Admission Enquiry Chat</title>
  <link rel="stylesheet" href="../css/admission.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 400px;
      max-width: 95%;
      margin: auto;
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    #chatBox {
      height: 400px;
      overflow-y: auto;
      margin-top: 15px;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 10px;
      background: #fafafa;
    }
</style>
</head>

<body>

<div class="container">
  <h2>🎓 Admission Enquiry Chat</h2>

  <input id="name" placeholder="Your Name">
  <input id="message" placeholder="Type your enquiry">
  <button onclick="sendMessage()">Send</button>

  <div id="chatBox"></div>
</div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔥 Firebase config
  const firebaseConfig = {
  apiKey: "AIzaSyAgDI3b7xS11qYvC9oQKFWbYTAKJdVHffk",
  authDomain: "sdhr-chat.firebaseapp.com",
  projectId: "sdhr-chat",
  storageBucket: "sdhr-chat.firebasestorage.app",
  messagingSenderId: "58527401520",
  appId: "1:58527401520:web:5945df00f201b6eecf0ff5",
  measurementId: "G-LGHTVMF0J7"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

  const chatRef = collection(db, "admission_enquiries");
  const q = query(chatRef, orderBy("time", "asc"));
  import { serverTimestamp } from "firebase/firestore";
  time: serverTimestamp()

  // 💬 SEND MESSAGE
  window.sendMessage = async function () {
    let name = document.getElementById("name").value;
    let message = document.getElementById("message").value;

    if (!name || !message) {
      alert("Please fill all fields");
      return;
    }
    console.log("Message sent");

    // user message
    await addDoc(chatRef, {
      name,
      message,
      type: "user",
      time: new Date()
    });

    // optional AI reply (simple rule-based if no API)
    setTimeout(async () => {
  await addDoc(chatRef, {
    name: "AI Assistant",
    message: generateReply(message),
    type: "ai",
    time: new Date()
  });
}, 1000);

    document.getElementById("message").value = "";
  };

  // 🤖 Simple AI logic (you can replace with OpenAI later)
  function generateReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("fee")) return "Our college fee details will be shared during admission process.";
    if (msg.includes("course")) return "We offer B.Com, B.Sc, B.A, and PG courses.";
    if (msg.includes("admission")) return "Admissions are open now. Please visit college office.";
    if (msg.includes("hello")) return "Hello! How can I help you with admissions?";
    
    return "Thank you for your enquiry. Our team will contact you soon.";
  }

  // 🔄 REAL-TIME CHAT
  onSnapshot(q, (snapshot) => {
    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    snapshot.forEach((doc) => {
      let data = doc.data();

      let bg = data.type === "ai" ? "#d4f8d4" : "#dbefff";
      let align = data.type === "ai" ? "left" : "right";

      chatBox.innerHTML += `
        <div style="
          margin:10px 0;
          padding:10px;
          background:${bg};
          border-radius:10px;
          text-align:${align};
        ">
          <b>${data.name}</b><br>
          ${data.message}
        </div>
      `;
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });

</script>

</body>
</html>
