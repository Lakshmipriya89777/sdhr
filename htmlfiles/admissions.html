<!DOCTYPE html>
<html>
<head>
  <title>ADMISSION ENQUIRY CHAT</title>
</head>

<body>
  <body style="font-family: Arial; background:#f2f2f2;">

  <div style="width:400px;margin:auto;margin-top:30px;background:white;padding:20px;border-radius:10px;">

    <h2>🎓 Admission Chat</h2>

    <input id="name" placeholder="Your Name"
      style="width:100%;padding:10px;margin-bottom:10px;">

    <input id="message" placeholder="Your Enquiry"
      style="width:100%;padding:10px;margin-bottom:10px;">

    <button onclick="sendMessage()"
      style="width:100%;padding:10px;background:green;color:white;border:none;">
      Send
    </button>

    <div id="chatBox" style="margin-top:20px;height:300px;overflow:auto;"></div>

  </div>

  <script type="module">

    async function getAIResponse(userMessage) {
  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer YOUR_OPENAI_API_KEY"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [
        {
          role: "system",
          content: "You are an admission enquiry assistant for a college. Answer politely and help students with courses, fees, and admissions."
        },
        {
          role: "user",
          content: userMessage
        }
      ]
    })
  });

  const data = await response.json();
  return data.choices[0].message.content;
}
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "...",
    authDomain: "...",
    projectId: "...",
    storageBucket: "...",
    messagingSenderId: "...",
    appId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ✅ SEND MESSAGE FUNCTION
 window.sendMessage = async function () {
  let name = document.getElementById("name").value;
  let message = document.getElementById("message").value;

  if (!message) return;

  // 1. Save user message
  await addDoc(collection(db, "admission_enquiries"), {
    name,
    message,
    type: "user",
    time: new Date()
  });

  // 2. Get AI reply
  let aiReply = await getAIResponse(message);

  // 3. Save AI message
  await addDoc(collection(db, "admission_enquiries"), {
    name: "AI Assistant",
    message: aiReply,
    type: "ai",
    time: new Date()
  });

  document.getElementById("message").value = "";
};

  // ⭐ THIS IS WHERE YOUR onSnapshot CODE GOES
  onSnapshot(q, (snapshot) => {
  let chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  snapshot.forEach((doc) => {
    let data = doc.data();

    let bg = data.type === "ai" ? "#d1ffd6" : "#e1f5fe";
    let align = data.type === "ai" ? "left" : "right";

    chatBox.innerHTML += `
      <div style="
        margin:10px 0;
        padding:10px;
        background:${bg};
        border-radius:10px;
        text-align:${align};
      ">
        <b>${data.name}</b><br>
        ${data.message}
      </div>
    `;
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>
</body>
</html>
